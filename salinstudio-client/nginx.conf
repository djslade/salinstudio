real_ip_header X-Forwarded-For;
set_real_ip_from 172.18.0.0/16;
real_ip_recursive on;

server {
    listen 3000;
    server_name localhost;

    client_max_body_size 50M;

    location /sitemap.xml {
        proxy_pass http://server:3000/sitemap;
    }

    location /api/ {
        proxy_pass http://server:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # NEW ROOT LOCATION FOR SEO4AJAX
    location / {
        try_files $uri @s4a_analyse;
    }

    # SEO4AJAX BOT ANALYSIS
    location @s4a_analyse {

        if ($http_user_agent ~* (google|bot|lighthouse|spider|pinterest|crawler|archiver|flipboardproxy|mediapartners|facebookexternalhit|insights|quora|whatsapp|slurp)) {
            rewrite ^(.*)$ /s4a_proxy last;
        }

        # Optional escaped fragment support
        # if ($args ~ "_escaped_fragment_=") { 
        #     rewrite  ^(.*)$  /s4a_proxy  last;
        # }

        if ($http_from ~* .+) {
            rewrite ^(.*)$ /s4a_proxy last;
        }

        # SPA fallback
        try_files /index.html =404;
    }

    # SEO4AJAX PROXY UPSTREAM
    location /s4a_proxy {
        add_header X-Is-Bot "1" always;
        
        set $s4a_domain 'https://api.seo4ajax.com/c09a5ade1120cfda9610d4d0b01063d5';
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        resolver 8.8.8.8 8.8.4.4;
        proxy_pass $s4a_domain$request_uri;
    }
}
