name: ci

on:
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: salinstudio-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: salinstudio-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Test
        run: npm test

  client:
    name: Client — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: salinstudio-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: salinstudio-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  admin:
    name: Admin — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: salinstudio-admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: salinstudio-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
